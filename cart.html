<!DOCTYPE html>
<html>
<head>
    <title>LocalKart - Cart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>



<header>
<div class="navbar">
    
    

    <div class="logo">
        <img src="logo.png" class="logo-img">
        <span>LocalKart</span>
    </div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="shops.html">Shops</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
        <a href="pricing.html">Pricing</a>
        <a href="checkout.html">Checkout</a>
        
    </div>

</div>

</header>

<section>
    
<div class="cart-page">
    <section>
        <h2>Your Cart</h2>

        <table id="cartTable">
            <thead>
                

                <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Total</th>
                <th>Remove</th>
                </tr>

            </thead>
            <tbody></tbody>
        </table>

        <div class="cart-summary">
            <h3 class="cart-total">Total: ₹<span id="grandTotal">0</span></h3>
            <button class="checkout-btn" onclick="goToCheckout()">Continue</button>
        </div>

    </section>
</div>

</section>


<footer class="footer">
    <p>© 2026 LocalKart. Hyperlocal Marketplace</p>
</footer>


<script src="js/script.js">
</script>



</body>
</html>
